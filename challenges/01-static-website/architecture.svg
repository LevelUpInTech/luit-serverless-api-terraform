<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <title>Challenge 01: Static Website on AWS S3 — Architecture</title>
  <desc>A user's browser sends an HTTPS GET request to an S3 static website endpoint in us-east-1. The S3 bucket has versioning, AES256 encryption, a tuned public access block, and a bucket policy that allows s3:GetObject for everyone. The bucket returns index.html. Everything is deployed via Terraform.</desc>

  <!-- Background -->
  <rect width="900" height="540" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#232F3E">
    Challenge 01: Static Website on AWS S3
  </text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#5A6A7A">
    What you ship when all 3 TODOs are solved
  </text>

  <!-- ============================== -->
  <!-- LEFT: User / Browser           -->
  <!-- ============================== -->
  <g transform="translate(60, 200)">
    <!-- Monitor body -->
    <rect x="0" y="0" width="140" height="90" rx="6" fill="#F2F3F3" stroke="#232F3E" stroke-width="1.5"/>
    <rect x="8" y="8" width="124" height="64" rx="2" fill="#FFFFFF" stroke="#D5DBDB" stroke-width="1"/>
    <!-- Browser chrome dots -->
    <circle cx="18" cy="16" r="2.5" fill="#FF5F57"/>
    <circle cx="26" cy="16" r="2.5" fill="#FEBC2E"/>
    <circle cx="34" cy="16" r="2.5" fill="#28C840"/>
    <!-- URL bar mock -->
    <rect x="14" y="24" width="112" height="10" rx="2" fill="#F2F3F3"/>
    <!-- Page mock -->
    <rect x="14" y="40" width="80" height="4" rx="1" fill="#58A6FF"/>
    <rect x="14" y="50" width="100" height="3" rx="1" fill="#D5DBDB"/>
    <rect x="14" y="58" width="90" height="3" rx="1" fill="#D5DBDB"/>
    <!-- Stand -->
    <rect x="58" y="90" width="24" height="8" fill="#232F3E"/>
    <rect x="40" y="98" width="60" height="4" rx="1" fill="#232F3E"/>
    <text x="70" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#232F3E">User Browser</text>
    <text x="70" y="135" text-anchor="middle" font-size="11" fill="#5A6A7A">Anywhere on the internet</text>
  </g>

  <!-- ============================== -->
  <!-- ARROWS                          -->
  <!-- ============================== -->
  <!-- Request arrow (top) -->
  <g>
    <line x1="210" y1="225" x2="425" y2="225" stroke="#FF9900" stroke-width="2"/>
    <polygon points="425,225 418,221 418,229" fill="#FF9900"/>
    <text x="317" y="218" text-anchor="middle" font-size="12" font-weight="600" fill="#232F3E">GET / (HTTPS)</text>
  </g>
  <!-- Response arrow (bottom) -->
  <g>
    <line x1="425" y1="265" x2="210" y2="265" stroke="#1E8E3E" stroke-width="2"/>
    <polygon points="210,265 217,261 217,269" fill="#1E8E3E"/>
    <text x="317" y="282" text-anchor="middle" font-size="12" font-weight="600" fill="#232F3E">200 OK + index.html</text>
  </g>

  <!-- ============================== -->
  <!-- RIGHT: AWS Region              -->
  <!-- ============================== -->
  <g transform="translate(425, 100)">
    <!-- Region boundary -->
    <rect x="0" y="0" width="415" height="350" rx="10" fill="#FAFAFA" stroke="#232F3E" stroke-width="1.5" stroke-dasharray="4 4"/>
    <text x="20" y="22" font-size="12" font-weight="700" fill="#232F3E">AWS · us-east-1</text>

    <!-- S3 bucket box -->
    <g transform="translate(20, 40)">
      <!-- S3 service header strip -->
      <rect x="0" y="0" width="375" height="32" rx="6" fill="#1E8E3E"/>
      <rect x="0" y="16" width="375" height="16" fill="#1E8E3E"/>
      <!-- Bucket icon (simple bucket shape) -->
      <g transform="translate(14, 6)">
        <path d="M 0 4 L 20 4 L 18 22 L 2 22 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="1"/>
        <ellipse cx="10" cy="4" rx="10" ry="3" fill="#FFFFFF"/>
        <ellipse cx="10" cy="4" rx="6" ry="1.6" fill="#1E8E3E"/>
      </g>
      <text x="44" y="22" font-size="14" font-weight="700" fill="#FFFFFF">Amazon S3 — Static Website Bucket</text>
      <text x="370" y="22" text-anchor="end" font-size="11" font-weight="600" fill="#FFFFFF">luit-{random}</text>

      <!-- Bucket body -->
      <rect x="0" y="32" width="375" height="245" rx="0" fill="#FFFFFF" stroke="#D5DBDB" stroke-width="1"/>
      <rect x="0" y="270" width="375" height="7" rx="0" fill="#D5DBDB"/>

      <!-- Properties -->
      <g font-size="12" fill="#232F3E">
        <!-- Versioning -->
        <g transform="translate(14, 52)">
          <circle cx="6" cy="6" r="6" fill="#1E8E3E"/>
          <path d="M 3 6 L 5.5 8.5 L 9 4.5" stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
          <text x="20" y="10" font-weight="600">Versioning enabled</text>
          <text x="20" y="24" fill="#5A6A7A" font-size="11">Deleted objects can be recovered</text>
        </g>
        <!-- Encryption -->
        <g transform="translate(14, 92)">
          <circle cx="6" cy="6" r="6" fill="#1E8E3E"/>
          <path d="M 3 6 L 5.5 8.5 L 9 4.5" stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
          <text x="20" y="10" font-weight="600">AES256 server-side encryption</text>
          <text x="20" y="24" fill="#5A6A7A" font-size="11">Data encrypted at rest by default</text>
        </g>
        <!-- Public Access Block -->
        <g transform="translate(14, 132)">
          <circle cx="6" cy="6" r="6" fill="#FF9900"/>
          <text x="6" y="10" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">!</text>
          <text x="20" y="10" font-weight="600">Public Access Block (tuned)</text>
          <text x="20" y="24" fill="#5A6A7A" font-size="11">block_public_acls = true · block_public_policy = false</text>
        </g>
        <!-- Bucket Policy -->
        <g transform="translate(14, 172)">
          <circle cx="6" cy="6" r="6" fill="#FF9900"/>
          <text x="6" y="10" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">!</text>
          <text x="20" y="10" font-weight="600">Bucket Policy: s3:GetObject for *</text>
          <text x="20" y="24" fill="#5A6A7A" font-size="11">Scoped to bucket ARN /* — read-only, anyone</text>
        </g>

        <!-- index.html object -->
        <g transform="translate(14, 215)">
          <rect x="0" y="0" width="345" height="45" rx="4" fill="#F2F3F3" stroke="#D5DBDB" stroke-width="1"/>
          <!-- Document icon -->
          <g transform="translate(10, 10)">
            <path d="M 0 0 L 14 0 L 20 6 L 20 26 L 0 26 Z" fill="#FFFFFF" stroke="#232F3E" stroke-width="1"/>
            <path d="M 14 0 L 14 6 L 20 6" fill="none" stroke="#232F3E" stroke-width="1"/>
            <line x1="4" y1="11" x2="16" y2="11" stroke="#232F3E" stroke-width="1"/>
            <line x1="4" y1="15" x2="16" y2="15" stroke="#232F3E" stroke-width="1"/>
            <line x1="4" y1="19" x2="12" y2="19" stroke="#232F3E" stroke-width="1"/>
          </g>
          <text x="42" y="20" font-weight="700" font-size="12">index.html</text>
          <text x="42" y="35" font-size="11" fill="#5A6A7A">content-type: text/html  ·  uploaded via aws_s3_object</text>
        </g>
      </g>
    </g>
  </g>

  <!-- ============================== -->
  <!-- BOTTOM: Terraform footer       -->
  <!-- ============================== -->
  <g transform="translate(60, 480)">
    <rect x="0" y="0" width="780" height="40" rx="6" fill="#F2F3F3" stroke="#D5DBDB" stroke-width="1"/>
    <!-- Terraform mark -->
    <g transform="translate(14, 9)">
      <rect x="0" y="0" width="22" height="22" rx="2" fill="#7B42BC"/>
      <text x="11" y="16" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">T</text>
    </g>
    <text x="48" y="18" font-size="12" font-weight="700" fill="#232F3E">Deployed entirely as Infrastructure as Code</text>
    <text x="48" y="34" font-size="11" fill="#5A6A7A">providers.tf  ·  main.tf (random_id, aws_s3_bucket, _website_configuration, _versioning, _server_side_encryption_configuration, _object, _public_access_block, _bucket_policy)  ·  outputs.tf</text>
  </g>
</svg>
